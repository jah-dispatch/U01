<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit of One | Establishing Connection...</title>
    <style>
        /* --- U01 Video Splash Base --- */
        :root {
            --bg-void: #000000;
            --strike-gold: #C89736;
            --text-mono: "SF Mono", Consolas, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-void);
            color: var(--strike-gold);
            overflow: hidden; /* Prevents any scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        /* --- Fullscreen Video Background --- */
        .u01-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .u01-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures no letterboxing */
        }

        /* --- Loading Bar Interface --- */
        .u01-loader-wrapper {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            z-index: 2;
            text-align: center;
        }

        .u01-status-text {
            font-family: var(--text-mono);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
            animation: pulseText 1.5s infinite ease-in-out;
        }

        .u01-progress-bar {
            width: 100%;
            height: 4px;
            background-color: rgba(200, 151, 54, 0.2);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .u01-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: var(--strike-gold);
            width: 0%;
            box-shadow: 0 0 10px var(--strike-gold);
            /* Forces the animation to take exactly 5 seconds */
            animation: loadSequence 5s linear forwards; 
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes loadSequence {
            0% { width: 0%; }
            20% { width: 15%; }
            50% { width: 60%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        /* Fallback skip button just in case user's browser blocks autoplay */
        .u01-skip {
            position: absolute;
            bottom: 3%;
            z-index: 3;
            color: rgba(255, 255, 255, 0.3);
            font-family: var(--text-mono);
            font-size: 0.7rem;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .u01-skip:hover { color: var(--strike-gold); }
    </style>
</head>
<body>

    <div class="u01-video-container">
        <!-- The playsinline attribute is critical for iOS mobile browsers -->
        <video id="introVideo" autoplay muted playsinline>
            <!-- Loads 9:16 video on mobile screens -->
            <source media="(max-width: 768px)" src="assets/u01-intro-mobile.mp4" type="video/mp4">
            <!-- Loads 16:9 video on desktop screens -->
            <source src="assets/u01-intro-desktop.mp4" type="video/mp4">
        </video>
    </div>

    <div class="u01-loader-wrapper">
        <div class="u01-status-text">Bypassing Systemic Grid...</div>
        <div class="u01-progress-bar">
            <div class="u01-progress-fill"></div>
        </div>
    </div>

    <a href="splash.html" class="u01-skip">OVERRIDE / SKIP SEQUENCE</a>

    <script>
        const video = document.getElementById('introVideo');
        
        // Listen for the exact moment the video finishes playing
        video.addEventListener('ended', function() {
            // Instantly route to the main architecture
            window.location.href = 'splash.html';
        });

        // Failsafe: If the video fails to load or browser blocks autoplay, 
        // force the redirect after 5.5 seconds to prevent users from getting stuck.
        setTimeout(() => {
            window.location.href = 'splash.html';
        }, 5500);
    </script>

</body>
</html>
